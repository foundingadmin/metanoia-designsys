<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Type — Display & Headings</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px 28px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-1);}
  .row{display:flex;align-items:baseline;gap:24px;padding:10px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:none;}
  .meta{flex:0 0 110px;font-family:var(--font-mono);font-size:11px;color:var(--fg-3);letter-spacing:0;padding-top:6px;}
  .spec{flex:1;color:var(--fg-1);}
  .display{font-size:96px;font-weight:600;line-height:0.95;letter-spacing:-0.035em;}
  .h1{font-size:48px;font-weight:700;line-height:1.05;letter-spacing:-0.02em;}
  .h2{font-size:32px;font-weight:700;line-height:1.2;letter-spacing:-0.01em;}
  .h3{font-size:24px;font-weight:600;line-height:1.2;}
</style>
</head>
<body>
  <div class="row"><div class="meta">Display · 120/600</div><div class="spec display">metanoia</div></div>
  <div class="row"><div class="meta">H1 · 56/700</div><div class="spec h1">Asset information, simplified.</div></div>
  <div class="row"><div class="meta">H2 · 36/700</div><div class="spec h2">Built into one platform.</div></div>
  <div class="row"><div class="meta">H3 · 28/600</div><div class="spec h3">25 years of catalog conversion</div></div>
</body>
</html>
