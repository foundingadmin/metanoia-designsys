<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Primary Colors</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:16px;background:var(--bg-subtle);font-family:var(--font-sans);color:var(--fg-2);}
  .row{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
  .sw{display:flex;flex-direction:column;justify-content:flex-end;padding:16px 18px;color:#fff;position:relative;border-radius:10px;min-height:200px;}
  .name{font-size:14px;font-weight:600;letter-spacing:0;}
  .hex{font-family:var(--font-mono);font-size:12px;opacity:0.85;margin-top:2px;}
  .role{position:absolute;top:14px;left:18px;font-size:10px;letter-spacing:0.12em;text-transform:uppercase;font-weight:600;opacity:0.85;}
  .navy{background:#094B77;}
  .aqua{background:#32CBED;color:#062F4A;}
  .aqua .hex{opacity:0.7;}
  .laqua{background:#9BEBF9;color:#062F4A;}
  .laqua .hex{opacity:0.7;}
</style>
</head>
<body>
  <div class="row">
    <div class="sw navy"><div class="role">Primary</div><div class="name">Navy</div><div class="hex">#094B77</div></div>
    <div class="sw aqua"><div class="role">Primary accent</div><div class="name">Aqua</div><div class="hex">#32CBED</div></div>
    <div class="sw laqua"><div class="role">Secondary</div><div class="name">Light Aqua</div><div class="hex">#9BEBF9</div></div>
  </div>
</body>
</html>
