<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Radii</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px 20px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-2);overflow-x:auto;}
  h2{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);margin:0 0 16px;}
  .row{display:flex;flex-wrap:nowrap;gap:12px;align-items:flex-end;justify-content:center;min-width:max-content;margin:0 auto;}
  .item{display:flex;flex-direction:column;align-items:center;gap:8px;}
  .box{width:52px;height:52px;background:var(--color-navy-100);border:1px solid var(--color-navy-500);}
  .lbl{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .px{font-family:var(--font-mono);font-size:10px;color:var(--fg-4);}
</style>
</head>
<body>
  <h2>Corner radii</h2>
  <div class="row">
    <div class="item"><div class="box" style="border-radius:2px"></div><div class="lbl">xs</div><div class="px">2px</div></div>
    <div class="item"><div class="box" style="border-radius:4px"></div><div class="lbl">sm</div><div class="px">4px</div></div>
    <div class="item"><div class="box" style="border-radius:8px"></div><div class="lbl">md</div><div class="px">8px</div></div>
    <div class="item"><div class="box" style="border-radius:12px"></div><div class="lbl">lg</div><div class="px">12px</div></div>
    <div class="item"><div class="box" style="border-radius:16px"></div><div class="lbl">xl</div><div class="px">16px</div></div>
    <div class="item"><div class="box" style="border-radius:24px"></div><div class="lbl">2xl</div><div class="px">24px</div></div>
    <div class="item"><div class="box" style="border-radius:999px"></div><div class="lbl">pill</div><div class="px">999</div></div>
  </div>
</body>
</html>
