<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Weights</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:24px 28px;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-1);}
  h2{font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:var(--fg-3);margin:0 0 14px;}
  .row{display:grid;grid-template-columns:60px 1fr;gap:14px;align-items:baseline;padding:6px 0;border-bottom:1px solid var(--border-subtle);}
  .row:last-child{border:none;}
  .num{font-family:var(--font-mono);font-size:11px;color:var(--fg-3);}
  .smp{font-size:24px;letter-spacing:-0.01em;color:var(--fg-1);}
</style>
</head>
<body>
  <h2>Figtree weights · variable 300–700</h2>
  <div class="row"><div class="num">300</div><div class="smp" style="font-weight:300">metanoia · Light</div></div>
  <div class="row"><div class="num">400</div><div class="smp" style="font-weight:400">metanoia · Regular</div></div>
  <div class="row"><div class="num">500</div><div class="smp" style="font-weight:500">metanoia · Medium</div></div>
  <div class="row"><div class="num">600</div><div class="smp" style="font-weight:600">metanoia · Semibold</div></div>
  <div class="row"><div class="num">700</div><div class="smp" style="font-weight:700">metanoia · Bold</div></div>
</body>
</html>
