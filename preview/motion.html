<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Motion — Metanoia DS</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: var(--font-sans);
  background: var(--bg-canvas);
  color: var(--fg-2);
  padding: var(--space-6);
  -webkit-font-smoothing: antialiased;
}

/* ── Section label ── */
.label {
  font-size: 11px;
  font-weight: var(--fw-semibold);
  letter-spacing: var(--ls-wide);
  text-transform: uppercase;
  color: var(--fg-4);
  margin-bottom: var(--space-3);
}

/* ── Row layout ── */
.group { margin-bottom: var(--space-8); }
.group:last-child { margin-bottom: 0; }

/* ── Easing demos ── */
.ease-grid {
  display: grid;
  grid-template-columns: repeat(3, 1fr);
  gap: var(--space-3);
}
.ease-card {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  overflow: hidden;
  background: var(--bg-subtle);
}
.ease-track {
  position: relative;
  height: 52px;
  background: var(--bg-canvas);
  border-bottom: 1px solid var(--border-subtle);
  overflow: hidden;
  cursor: pointer;
}
.ease-ball {
  position: absolute;
  top: 50%;
  left: 10px;
  transform: translateY(-50%);
  width: 10px;
  height: 10px;
  border-radius: 50%;
  background: var(--color-navy);
  transition-duration: var(--dur-slow);
  transition-property: left, background-color;
}
.ease-card[data-ease="standard"] .ease-ball  { transition-timing-function: var(--ease-standard); }
.ease-card[data-ease="emphasized"] .ease-ball { transition-timing-function: var(--ease-emphasized); }
.ease-card[data-ease="out"] .ease-ball        { transition-timing-function: var(--ease-out); }

.ease-card:hover .ease-ball,
.ease-card.playing .ease-ball {
  left: calc(100% - 20px);
  background: var(--color-aqua-700);
}
.ease-card:not(:hover):not(.playing) .ease-ball {
  left: 10px;
  background: var(--color-navy);
  transition-duration: 200ms;
  transition-timing-function: var(--ease-standard);
}

.ease-meta {
  padding: 8px 10px;
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.ease-name {
  font-size: var(--fs-13);
  font-weight: var(--fw-semibold);
  color: var(--fg-1);
}
.ease-token {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-4);
}
.ease-value {
  font-family: var(--font-mono);
  font-size: 10px;
  color: var(--fg-3);
}

/* ── Duration demos ── */
.dur-list {
  display: flex;
  flex-direction: column;
  gap: var(--space-2);
}
.dur-row {
  display: grid;
  grid-template-columns: 88px 1fr 52px;
  align-items: center;
  gap: var(--space-3);
  padding: var(--space-2) var(--space-3);
  background: var(--bg-subtle);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-md);
}
.dur-meta {
  display: flex;
  flex-direction: column;
  gap: 2px;
}
.dur-token {
  font-family: var(--font-mono);
  font-size: 11px;
  font-weight: var(--fw-semibold);
  color: var(--color-navy);
}
.dur-label {
  font-size: 10px;
  color: var(--fg-4);
  letter-spacing: 0.03em;
}

/* Bar animation track */
.dur-track {
  position: relative;
  height: 6px;
  background: var(--color-grey-100);
  border-radius: var(--radius-pill);
  overflow: hidden;
  cursor: pointer;
}
.dur-bar {
  position: absolute;
  left: 0; top: 0; bottom: 0;
  background: var(--color-navy);
  border-radius: var(--radius-pill);
  width: 0;
  transition: width 0ms;
  transition-timing-function: var(--ease-standard);
}
.dur-row[data-ms="120"]  .dur-bar { transition-duration: 120ms; }
.dur-row[data-ms="200"]  .dur-bar { transition-duration: 200ms; }
.dur-row[data-ms="320"]  .dur-bar { transition-duration: 320ms; }
.dur-row.playing .dur-bar { width: 100%; }

.dur-badge {
  font-family: var(--font-mono);
  font-size: var(--fs-12);
  font-weight: var(--fw-semibold);
  color: var(--fg-3);
  text-align: right;
  white-space: nowrap;
}

/* ── Play all button ── */
.play-btn {
  display: inline-flex;
  align-items: center;
  gap: var(--space-2);
  padding: 6px 14px;
  border-radius: var(--radius-md);
  border: 1px solid var(--border-default);
  background: var(--bg-canvas);
  font-family: var(--font-sans);
  font-size: var(--fs-13);
  font-weight: var(--fw-medium);
  color: var(--fg-2);
  cursor: pointer;
  margin-bottom: var(--space-4);
  transition: background var(--dur-fast) var(--ease-standard),
              border-color var(--dur-fast) var(--ease-standard),
              color var(--dur-fast) var(--ease-standard);
}
.play-btn:hover {
  background: var(--bg-subtle);
  border-color: var(--border-strong);
  color: var(--fg-1);
}
.play-btn svg {
  width: 13px; height: 13px; flex-shrink: 0;
}
</style>
</head>
<body>

<!-- Easing -->
<div class="group">
  <p class="label">Easing — tokens/motion.css</p>
  <div class="ease-grid">

    <div class="ease-card" data-ease="standard">
      <div class="ease-track"><div class="ease-ball"></div></div>
      <div class="ease-meta">
        <span class="ease-name">Standard</span>
        <span class="ease-token">--ease-standard</span>
        <span class="ease-value">cubic-bezier(0.2, 0, 0, 1)</span>
      </div>
    </div>

    <div class="ease-card" data-ease="emphasized">
      <div class="ease-track"><div class="ease-ball"></div></div>
      <div class="ease-meta">
        <span class="ease-name">Emphasized</span>
        <span class="ease-token">--ease-emphasized</span>
        <span class="ease-value">cubic-bezier(0.2, 0, 0, 1.2)</span>
      </div>
    </div>

    <div class="ease-card" data-ease="out">
      <div class="ease-track"><div class="ease-ball"></div></div>
      <div class="ease-meta">
        <span class="ease-name">Ease Out</span>
        <span class="ease-token">--ease-out</span>
        <span class="ease-value">cubic-bezier(0, 0, 0, 1)</span>
      </div>
    </div>

  </div>
</div>

<!-- Duration -->
<div class="group">
  <button class="play-btn" id="play-all-btn" onclick="playAll()">
    <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <polygon points="5,3 13,8 5,13" fill="currentColor" stroke="none"/>
    </svg>
    Play all
  </button>
  <div class="dur-list">

    <div class="dur-row" data-ms="120">
      <div class="dur-meta">
        <span class="dur-token">--dur-fast</span>
        <span class="dur-label">Micro-interactions</span>
      </div>
      <div class="dur-track"><div class="dur-bar"></div></div>
      <span class="dur-badge">120ms</span>
    </div>

    <div class="dur-row" data-ms="200">
      <div class="dur-meta">
        <span class="dur-token">--dur-base</span>
        <span class="dur-label">Standard transitions</span>
      </div>
      <div class="dur-track"><div class="dur-bar"></div></div>
      <span class="dur-badge">200ms</span>
    </div>

    <div class="dur-row" data-ms="320">
      <div class="dur-meta">
        <span class="dur-token">--dur-slow</span>
        <span class="dur-label">Panels, modals, reveals</span>
      </div>
      <div class="dur-track"><div class="dur-bar"></div></div>
      <span class="dur-badge">320ms</span>
    </div>

  </div>
</div>

<script>
function playAll() {
  const rows = document.querySelectorAll('.dur-row');
  rows.forEach(row => {
    row.classList.remove('playing');
    void row.querySelector('.dur-bar').offsetWidth; // reflow
  });
  // Stagger each bar by 80ms so they don't all start at once
  rows.forEach((row, i) => {
    setTimeout(() => row.classList.add('playing'), i * 80);
  });
  // Reset after the longest + buffer
  setTimeout(() => rows.forEach(row => row.classList.remove('playing')), 320 + 80 * (rows.length - 1) + 400);
}
</script>
</body>
</html>
