<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Metanoia Design System</title>
<link rel="stylesheet" href="colors_and_type.css">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
html { scroll-behavior: smooth; }
body {
  font-family: var(--font-sans);
  background: var(--bg-subtle);
  color: var(--fg-2);
  -webkit-font-smoothing: antialiased;
  min-height: 100vh;
}

/* ── Header ── */
.ds-header {
  position: fixed; top: 0; left: 0; right: 0; height: 64px;
  background: var(--color-navy);
  border-bottom: 1px solid rgba(255,255,255,0.10);
  display: flex; align-items: center; gap: 12px;
  padding: 0 28px; z-index: 300;
}
.ds-wordmark {
  font-size: var(--fs-18); font-weight: var(--fw-bold);
  color: #fff; letter-spacing: var(--ls-tight); text-transform: lowercase;
  line-height: 1; flex-shrink: 0;
}
.ds-wordmark em { color: var(--color-aqua); font-style: normal; }
.ds-header-pipe { width: 1px; height: 20px; background: rgba(255,255,255,0.2); flex-shrink: 0; }
.ds-header-sub {
  font-size: var(--fs-13); color: rgba(255,255,255,0.55);
  font-weight: var(--fw-medium); white-space: nowrap;
}
.ds-version-pill {
  margin-left: auto; flex-shrink: 0;
  font-size: 11px; font-weight: var(--fw-semibold);
  background: rgba(50,203,237,0.15); color: var(--color-aqua);
  border: 1px solid rgba(50,203,237,0.3);
  border-radius: var(--radius-pill); padding: 3px 10px;
  letter-spacing: 0.03em; cursor: pointer;
  transition: background var(--dur-fast) var(--ease-standard);
  text-decoration: none; display: inline-flex; align-items: center; gap: 4px;
}
.ds-version-pill:hover { background: rgba(50,203,237,0.25); }
.ds-version-pill i { width: 11px; height: 11px; }
.ds-updated {
  font-size: var(--fs-12); color: rgba(255,255,255,0.35);
  white-space: nowrap; flex-shrink: 0;
}

/* ── Shell layout ── */
.ds-layout { display: flex; padding-top: 64px; min-height: 100vh; }

/* ── Sidebar ── */
.ds-sidebar {
  width: 228px; flex-shrink: 0;
  position: sticky; top: 64px; height: calc(100vh - 64px);
  overflow-y: auto;
  background: var(--bg-canvas); border-right: 1px solid var(--border-subtle);
  padding: 16px 10px 32px;
  scrollbar-width: thin; scrollbar-color: var(--border-subtle) transparent;
}
.ds-sidebar::-webkit-scrollbar { width: 3px; }
.ds-sidebar::-webkit-scrollbar-thumb { background: var(--border-subtle); border-radius: 99px; }
.sidebar-group { margin-bottom: 2px; }
.sidebar-group-label {
  display: block; font-size: 10px; font-weight: var(--fw-semibold);
  letter-spacing: var(--ls-eyebrow); text-transform: uppercase;
  color: var(--fg-4); padding: 10px 10px 4px;
}
.sidebar-group-label:first-child { padding-top: 2px; }
.sidebar-item {
  display: flex; align-items: center; gap: 7px; width: 100%;
  font-size: var(--fs-13); font-weight: var(--fw-medium); color: var(--fg-3);
  text-decoration: none; padding: 6px 10px; border-radius: var(--radius-md);
  border: none; background: transparent; text-align: left; cursor: pointer;
  transition: background var(--dur-fast) var(--ease-standard),
              color var(--dur-fast) var(--ease-standard);
}
.sidebar-item:hover { background: var(--bg-subtle); color: var(--fg-1); }
.sidebar-item.active {
  background: var(--color-aqua-50); color: var(--color-navy);
  font-weight: var(--fw-semibold);
}
.sidebar-item i { width: 13px; height: 13px; flex-shrink: 0; opacity: 0.65; }
.sidebar-item.active i { opacity: 1; }
.sidebar-divider { height: 1px; background: var(--border-subtle); margin: 8px 10px; }

/* ── Main ── */
.ds-main { flex: 1; min-width: 0; padding: 52px 52px 96px; }

/* ── Section ── */
.ds-section { margin-bottom: 64px; scroll-margin-top: 84px; }
.ds-section:last-child { margin-bottom: 0; }
.section-eyebrow {
  font-size: 11px; font-weight: var(--fw-semibold);
  letter-spacing: var(--ls-eyebrow); text-transform: uppercase;
  color: var(--color-aqua-700); margin-bottom: 5px;
}
.section-heading {
  font-size: var(--fs-24); font-weight: var(--fw-bold); color: var(--fg-1);
  letter-spacing: var(--ls-snug); line-height: var(--lh-snug); margin-bottom: 4px;
}
.section-desc {
  font-size: var(--fs-13); color: var(--fg-3);
  line-height: var(--lh-relaxed); margin-bottom: 20px; max-width: 56em;
}

/* ── Card grid ── */
.card-grid { display: grid; gap: 14px; }
.card-grid.cols-1 { grid-template-columns: 1fr; }
.card-grid.cols-2 { grid-template-columns: 1fr 1fr; }
.card-grid.cols-3 { grid-template-columns: 1fr 1fr 1fr; }
.card-grid.cols-4 { grid-template-columns: 1fr 1fr 1fr 1fr; }

/* ── Preview card ── */
.preview-card {
  background: var(--bg-canvas);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
}
.preview-card-bar {
  display: flex; align-items: center; justify-content: space-between;
  padding: 8px 14px;
  border-bottom: 1px solid var(--border-subtle);
  background: var(--bg-subtle);
}
.preview-card-bar-label {
  font-size: 11px; font-weight: var(--fw-semibold);
  color: var(--fg-4); letter-spacing: 0.04em;
  text-transform: uppercase; line-height: 1;
}
.preview-card-bar a {
  color: var(--fg-4); text-decoration: none;
  display: inline-flex; align-items: center; gap: 3px;
  font-size: 11px;
  transition: color var(--dur-fast) var(--ease-standard);
}
.preview-card-bar a:hover { color: var(--color-navy); }
.preview-card-bar a i { width: 11px; height: 11px; }
.preview-card iframe {
  width: 100%; border: none; display: block;
  transition: opacity 0.2s ease;
}
.preview-card iframe.loading { opacity: 0; }

/* ── Changelog section ── */
.changelog-title {
  font-size: var(--fs-18); font-weight: var(--fw-bold);
  color: var(--fg-1); margin-bottom: 16px; letter-spacing: var(--ls-snug);
}
.cl-entry {
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-lg);
  background: var(--bg-canvas);
  margin-bottom: 10px;
  box-shadow: var(--shadow-xs);
  overflow: hidden;
}
.cl-header {
  display: flex; align-items: center; gap: 10px;
  padding: 14px 18px; cursor: pointer; user-select: none;
  transition: background var(--dur-fast) var(--ease-standard);
}
.cl-header:hover { background: var(--bg-subtle); }
.cl-version {
  font-size: var(--fs-15); font-weight: var(--fw-bold);
  color: var(--fg-1); font-family: var(--font-mono); flex-shrink: 0;
}
.cl-badge {
  font-size: 10px; font-weight: var(--fw-semibold);
  padding: 2px 8px; border-radius: var(--radius-pill);
  letter-spacing: 0.06em; text-transform: uppercase; flex-shrink: 0;
}
.cl-badge.major { background: #FDECEA; color: var(--color-error); }
.cl-badge.minor { background: var(--color-navy-100); color: var(--color-navy); }
.cl-badge.patch { background: var(--bg-muted); color: var(--fg-3); }
.cl-date { font-size: var(--fs-12); color: var(--fg-4); margin-left: auto; flex-shrink: 0; }
.cl-chevron { color: var(--fg-4); flex-shrink: 0; transition: transform var(--dur-base) var(--ease-standard); }
.cl-chevron i { width: 15px; height: 15px; display: block; }
.cl-entry.open .cl-chevron { transform: rotate(180deg); }
.cl-body {
  display: none; padding: 0 18px 14px;
  border-top: 1px solid var(--border-subtle);
}
.cl-entry.open .cl-body { display: block; }
.cl-body ul { list-style: none; margin: 10px 0 0; display: flex; flex-direction: column; gap: 5px; }
.cl-body li {
  display: flex; align-items: baseline; gap: 8px;
  font-size: var(--fs-13); color: var(--fg-2); line-height: var(--lh-relaxed);
}
.cl-bullet {
  width: 5px; height: 5px; border-radius: 50%;
  background: var(--color-aqua-700); flex-shrink: 0; margin-top: 1px;
  display: inline-block;
}

/* ── Token count strip ── */
.ds-stats {
  display: flex; gap: 0;
  background: var(--bg-canvas);
  border: 1px solid var(--border-subtle);
  border-radius: var(--radius-xl);
  overflow: hidden;
  box-shadow: var(--shadow-sm);
  margin-bottom: 52px;
}
.ds-stat {
  flex: 1; padding: 20px 24px;
  border-right: 1px solid var(--border-subtle);
  text-align: center;
}
.ds-stat:last-child { border-right: none; }
.ds-stat-num {
  font-size: var(--fs-28); font-weight: var(--fw-bold);
  color: var(--color-navy); line-height: 1; letter-spacing: var(--ls-tight);
  display: block; margin-bottom: 4px;
}
.ds-stat-label {
  font-size: var(--fs-12); color: var(--fg-3); font-weight: var(--fw-medium);
  letter-spacing: 0.03em;
}
</style>
</head>
<body>

<!-- ── HEADER ── -->
<header class="ds-header">
  <span class="ds-wordmark">meta<em>noia</em></span>
  <div class="ds-header-pipe"></div>
  <span class="ds-header-sub">Design System</span>
  <a class="ds-version-pill" href="#changelog" id="version-pill">
    <i data-lucide="tag"></i>
    <span id="version-text">v1.1.0</span>
  </a>
  <span class="ds-updated" id="last-updated">Updated May 6, 2025</span>
</header>

<!-- ── LAYOUT ── -->
<div class="ds-layout">

  <!-- SIDEBAR -->
  <aside class="ds-sidebar" id="sidebar"></aside>

  <!-- MAIN -->
  <main class="ds-main">

    <!-- Stats strip -->
    <div class="ds-stats">
      <div class="ds-stat"><span class="ds-stat-num">80+</span><span class="ds-stat-label">Design tokens</span></div>
      <div class="ds-stat"><span class="ds-stat-num">13</span><span class="ds-stat-label">Components</span></div>
      <div class="ds-stat"><span class="ds-stat-num">26</span><span class="ds-stat-label">Preview cards</span></div>
      <div class="ds-stat"><span class="ds-stat-num">1</span><span class="ds-stat-label">Typeface (Figtree)</span></div>
      <div class="ds-stat"><span class="ds-stat-num">3</span><span class="ds-stat-label">Brand colors</span></div>
    </div>

    <!-- Sections rendered by JS -->
    <div id="sections-root"></div>

    <!-- Changelog -->
    <section class="ds-section" id="changelog" style="scroll-margin-top:84px;">
      <p class="section-eyebrow">Reference</p>
      <h2 class="section-heading">Changelog</h2>
      <p class="section-desc">Version history for the Metanoia Design System. Follow version rules in CLAUDE.md when making updates.</p>
      <div id="changelog-root"></div>
    </section>

  </main>
</div><!-- /.ds-layout -->

<script>
/* ================================================================
   VERSION — update these two constants when bumping a release.
   Then add an entry to CHANGELOG below.
   ================================================================ */
const VERSION      = '1.1.0';
const LAST_UPDATED = 'May 6, 2025';

/* ================================================================
   CHANGELOG
   type: 'major' | 'minor' | 'patch'
   Keep newest first.
   ================================================================ */
const CHANGELOG = [
  {
    version: '1.1.0',
    date: '2025-05-06',
    type: 'minor',
    changes: [
      'Added navigation component — top bar (light + dark/inverse) and sidebar with section groups',
      'Added tabs component — underline tabs with icons/counts + pill tabs (light + dark surface)',
      'Added modal/dialog component — confirmation, form, and success state variants',
      'Added breadcrumb component — chevron, slash, home-icon, dark surface, and page header context',
      'Added pagination component — numbered, mid-range, table footer, prev/next, compact',
      'Added empty states component — first-use, no-results, error, iBOM placeholder, loading skeleton',
      'Restructured repo: Metanoia Design System/ folder promoted to repo root',
      'Added index.html design system showcase with changelog + version tracker',
      'Added CLAUDE.md with versioning rules',
    ],
  },
  {
    version: '1.0.0',
    date: '2025-05-06',
    type: 'major',
    changes: [
      'Initial design system release',
      'Color tokens: primary (navy, aqua, light-aqua), tints, cool-grey scale, semantic status colors',
      'Typography tokens: Figtree variable font, full type scale (fs-12 → fs-96), semantic roles',
      'Spacing tokens: 4px grid (space-0 → space-32), radii, shadow stack, motion/easing',
      'Base components: buttons (5 variants + all states), form inputs, tags/badges, cards, alerts',
      'Data component: parts table with mono part numbers and status tags',
      'Marketing component: hero panel strip',
      'Logo assets: brandmark + horizontal + vertical lockups (color + mono variants)',
      'Iconography specification: Lucide, 2px stroke, 16/20/24px sizes',
      'Brand identity documented in README.md (voice, casing, visual foundations, caveats)',
    ],
  },
];

/* ================================================================
   SECTIONS
   Each entry builds one <section> in the main content and one
   link in the sidebar.

   cols: 1 | 2 | 3 | 4  → CSS grid columns for the card grid
   cards: array of { src, label }  → each card is an iframe

   To add a new section:
     1. Add an entry here
     2. Bump VERSION and add a CHANGELOG entry
   ================================================================ */
const SECTIONS = [
  /* ── Foundations ── */
  {
    id: 'colors', group: 'Foundations', icon: 'palette',
    label: 'Colors',
    desc: 'Primary brand palette, tints, cool-grey scale, and semantic status colors. All defined as CSS custom properties in colors_and_type.css.',
    cols: 2,
    cards: [
      { src: 'preview/colors-primary.html',  label: 'Primary palette' },
      { src: 'preview/colors-tints.html',    label: 'Tints & supporting' },
      { src: 'preview/colors-neutrals.html', label: 'Cool-grey scale' },
      { src: 'preview/colors-semantic.html', label: 'Semantic / status' },
    ],
  },
  {
    id: 'typography', group: 'Foundations', icon: 'type',
    label: 'Typography',
    desc: 'One typeface — Figtree (variable, 300–900 weight). Type scale, semantic roles, line-height, and wordmark casing rules.',
    cols: 1,
    cards: [
      { src: 'preview/type-display.html',  label: 'Display & headings' },
      { src: 'preview/type-body.html',     label: 'Body, lead & utility' },
      { src: 'preview/type-weights.html',  label: 'Weight reference' },
    ],
  },
  {
    id: 'spacing', group: 'Foundations', icon: 'ruler',
    label: 'Spacing & Layout',
    desc: '4px grid base. Spacing scale, border-radius ramp, and navy-tinted shadow stack.',
    cols: 3,
    cards: [
      { src: 'preview/spacing-scale.html',   label: 'Spacing scale' },
      { src: 'preview/spacing-radii.html',   label: 'Border radii' },
      { src: 'preview/spacing-shadows.html', label: 'Shadow stack' },
    ],
  },
  {
    id: 'iconography', group: 'Foundations', icon: 'shapes',
    label: 'Iconography',
    desc: 'Lucide icons — 2px stroke, 16/20/24px sizes, currentColor. No fills, no icon fonts.',
    cols: 1,
    cards: [
      { src: 'preview/iconography.html', label: 'Lucide icon reference' },
    ],
  },
  {
    id: 'logos', group: 'Foundations', icon: 'image',
    label: 'Logos',
    desc: 'Brandmark and lockups. The interlocking M is the only geometric motif. The wordmark "metanoia" is always lowercase Figtree Black.',
    cols: 2,
    cards: [
      { src: 'preview/logo-brandmark.html', label: 'Brandmark' },
      { src: 'preview/logo-lockups.html',   label: 'Lockups' },
    ],
  },
  /* ── Components ── */
  {
    id: 'buttons', group: 'Components', icon: 'square',
    label: 'Buttons',
    desc: 'Primary, secondary, ghost, destructive, and icon-only variants. Default, hover, active, focus, and disabled states.',
    cols: 1,
    cards: [
      { src: 'preview/components-buttons.html', label: 'Button variants' },
    ],
  },
  {
    id: 'inputs', group: 'Components', icon: 'text-cursor-input',
    label: 'Form Inputs',
    desc: 'Text, textarea, select, checkbox, radio, and toggle. Focus ring uses 3px aqua at 45% opacity.',
    cols: 1,
    cards: [
      { src: 'preview/components-inputs.html', label: 'Input variants' },
    ],
  },
  {
    id: 'tags', group: 'Components', icon: 'tag',
    label: 'Tags & Badges',
    desc: 'Status tags (dot + label), category badges, and count pills.',
    cols: 1,
    cards: [
      { src: 'preview/components-tags.html', label: 'Tags & badges' },
    ],
  },
  {
    id: 'cards', group: 'Components', icon: 'credit-card',
    label: 'Cards',
    desc: 'White surface, shadow-sm, 12px radius, 1px border. Light and dark surface variants with hover lift.',
    cols: 1,
    cards: [
      { src: 'preview/components-card.html', label: 'Card variants' },
    ],
  },
  {
    id: 'alerts', group: 'Components', icon: 'bell',
    label: 'Alerts',
    desc: 'Info, success, warning, and error. Inline and banner variants using semantic color tokens.',
    cols: 1,
    cards: [
      { src: 'preview/components-alerts.html', label: 'Alert variants' },
    ],
  },
  {
    id: 'table', group: 'Components', icon: 'table',
    label: 'Table',
    desc: 'Parts-catalog data table. Mono part numbers, tabular numerals, status tags, aqua-50 hover rows.',
    cols: 1,
    cards: [
      { src: 'preview/components-table.html', label: 'Data table' },
    ],
  },
  {
    id: 'hero', group: 'Components', icon: 'monitor',
    label: 'Hero',
    desc: 'Full-bleed navy hero strip. Eyebrow + H1 + body + dual CTA. Brandmark watermark motif at 10% opacity.',
    cols: 1,
    cards: [
      { src: 'preview/components-hero.html', label: 'Hero strip' },
    ],
  },
  {
    id: 'nav', group: 'Components', icon: 'navigation',
    label: 'Navigation',
    desc: 'Top nav (light + dark/inverse) and sidebar nav with section groups and badge counts.',
    cols: 1,
    cards: [
      { src: 'preview/components-nav.html', label: 'Navigation variants' },
    ],
  },
  {
    id: 'tabs', group: 'Components', icon: 'layout-panel-top',
    label: 'Tabs',
    desc: 'Underline tabs with optional icons and counts. Pill tabs for compact toggle groups, light and dark surface.',
    cols: 1,
    cards: [
      { src: 'preview/components-tabs.html', label: 'Tab variants' },
    ],
  },
  {
    id: 'modal', group: 'Components', icon: 'panel-top',
    label: 'Modal / Dialog',
    desc: 'Confirmation dialog, form dialog, and success state. Navy 40% backdrop. Icon header for context.',
    cols: 1,
    cards: [
      { src: 'preview/components-modal.html', label: 'Modal variants' },
    ],
  },
  {
    id: 'breadcrumb', group: 'Components', icon: 'chevrons-right',
    label: 'Breadcrumb',
    desc: 'Chevron and slash separator variants, home-icon, dark surface, and in-context page header example.',
    cols: 1,
    cards: [
      { src: 'preview/components-breadcrumb.html', label: 'Breadcrumb variants' },
    ],
  },
  {
    id: 'pagination', group: 'Components', icon: 'more-horizontal',
    label: 'Pagination',
    desc: 'Numbered, mid-range, full table footer with row count + per-page selector, prev/next, and compact.',
    cols: 1,
    cards: [
      { src: 'preview/components-pagination.html', label: 'Pagination variants' },
    ],
  },
  {
    id: 'empty', group: 'Components', icon: 'inbox',
    label: 'Empty States',
    desc: 'First-use/onboarding, no-search-results, error, iBOM placeholder, and shimmer loading skeleton.',
    cols: 1,
    cards: [
      { src: 'preview/components-empty.html', label: 'Empty state variants' },
    ],
  },
];

/* ================================================================
   BOOTSTRAP — runs after DOM ready
   ================================================================ */
document.addEventListener('DOMContentLoaded', () => {

  // Apply version to header
  document.getElementById('version-text').textContent = 'v' + VERSION;
  document.getElementById('last-updated').textContent  = 'Updated ' + LAST_UPDATED;

  buildSidebar();
  buildSections();
  buildChangelog();
  initScrollspy();
  initIframeLazy();

  lucide.createIcons();
});

/* ── Build sidebar from SECTIONS ── */
function buildSidebar() {
  const sidebar = document.getElementById('sidebar');
  let currentGroup = null;
  let html = '';

  SECTIONS.forEach(s => {
    if (s.group !== currentGroup) {
      if (currentGroup !== null) html += '<div class="sidebar-divider"></div>';
      html += `<span class="sidebar-group-label">${s.group}</span>`;
      currentGroup = s.group;
    }
    html += `
      <a class="sidebar-item" href="#${s.id}" data-section="${s.id}">
        <i data-lucide="${s.icon}"></i>${s.label}
      </a>`;
  });

  // Changelog link
  html += `
    <div class="sidebar-divider"></div>
    <span class="sidebar-group-label">Reference</span>
    <a class="sidebar-item" href="#changelog" data-section="changelog">
      <i data-lucide="history"></i>Changelog
    </a>`;

  sidebar.innerHTML = html;
}

/* ── Build main content sections ── */
function buildSections() {
  const root = document.getElementById('sections-root');
  let html = '';

  SECTIONS.forEach(s => {
    html += `
<section class="ds-section" id="${s.id}">
  <p class="section-eyebrow">${s.group}</p>
  <h2 class="section-heading">${s.label}</h2>
  <p class="section-desc">${s.desc}</p>
  <div class="card-grid cols-${s.cols}">`;

    s.cards.forEach(card => {
      html += `
    <div class="preview-card">
      <div class="preview-card-bar">
        <span class="preview-card-bar-label">${card.label}</span>
        <a href="${card.src}" target="_blank" rel="noopener" title="Open in new tab">
          <i data-lucide="external-link"></i> open
        </a>
      </div>
      <iframe
        class="loading"
        data-src="${card.src}"
        title="${card.label}"
        loading="lazy"
        scrolling="no"
        style="min-height:120px;"
      ></iframe>
    </div>`;
    });

    html += `
  </div>
</section>`;
  });

  root.innerHTML = html;
}

/* ── Build changelog ── */
function buildChangelog() {
  const root = document.getElementById('changelog-root');
  let html = '';

  CHANGELOG.forEach((entry, i) => {
    const isOpen = i === 0;
    html += `
<div class="cl-entry${isOpen ? ' open' : ''}">
  <div class="cl-header" onclick="this.parentElement.classList.toggle('open')">
    <span class="cl-version">v${entry.version}</span>
    <span class="cl-badge ${entry.type}">${entry.type}</span>
    <span class="cl-date">${formatDate(entry.date)}</span>
    <span class="cl-chevron"><i data-lucide="chevron-down"></i></span>
  </div>
  <div class="cl-body">
    <ul>
      ${entry.changes.map(c => `<li><span class="cl-bullet"></span>${c}</li>`).join('\n      ')}
    </ul>
  </div>
</div>`;
  });

  root.innerHTML = html;
}

/* ── Scrollspy ── */
function initScrollspy() {
  const allSectionIds = [...SECTIONS.map(s => s.id), 'changelog'];
  const observer = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const id = entry.target.id;
      document.querySelectorAll('.sidebar-item').forEach(el => el.classList.remove('active'));
      const link = document.querySelector(`.sidebar-item[data-section="${id}"]`);
      if (link) {
        link.classList.add('active');
        link.scrollIntoView({ block: 'nearest', behavior: 'smooth' });
      }
    });
  }, { rootMargin: '-15% 0px -70% 0px', threshold: 0 });

  allSectionIds.forEach(id => {
    const el = document.getElementById(id);
    if (el) observer.observe(el);
  });
}

/* ── Lazy-load iframes + auto-height ── */
function initIframeLazy() {
  const lazyLoad = new IntersectionObserver(entries => {
    entries.forEach(entry => {
      if (!entry.isIntersecting) return;
      const iframe = entry.target;
      iframe.src = iframe.dataset.src;
      iframe.addEventListener('load', () => fitIframe(iframe));
      lazyLoad.unobserve(iframe);
    });
  }, { rootMargin: '300px' });

  document.querySelectorAll('iframe[data-src]').forEach(el => lazyLoad.observe(el));
}

function fitIframe(iframe) {
  // Wait for fonts; try twice
  const tryFit = () => {
    try {
      const h = iframe.contentDocument.documentElement.scrollHeight;
      if (h > 0) {
        iframe.style.height = h + 'px';
        iframe.classList.remove('loading');
      }
    } catch (_) {}
  };
  setTimeout(tryFit, 80);
  setTimeout(tryFit, 400);
}

/* ── Util ── */
function formatDate(iso) {
  const d = new Date(iso + 'T00:00:00');
  return d.toLocaleDateString('en-US', { year: 'numeric', month: 'long', day: 'numeric' });
}
