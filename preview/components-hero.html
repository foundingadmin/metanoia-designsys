<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<title>Hero strip</title>
<link rel="stylesheet" href="../colors_and_type.css">
<style>
  html,body{margin:0;padding:0;background:var(--bg-canvas);font-family:var(--font-sans);color:var(--fg-2);}
  .hero{background:#094B77;color:#fff;padding:72px 40px 56px;display:grid;grid-template-columns:1.6fr 1fr;gap:24px;align-items:center;position:relative;overflow:hidden;}
  .eyebrow{font-size:12px;font-weight:600;letter-spacing:0.14em;text-transform:uppercase;color:var(--color-aqua);margin:0 0 10px;}
  h1{font-size:clamp(22px,5vw,36px);font-weight:700;line-height:1.05;letter-spacing:-0.02em;margin:0 0 12px;color:#fff;text-wrap:balance;}
  @media(max-width:480px){
    .hero{grid-template-columns:1fr;padding:36px 24px 32px;}
    .hero>div:last-of-type{display:none;}
    h1{font-size:clamp(22px,7vw,32px);text-wrap:pretty;width:100%;}
  }
  p{font-size:15px;color:rgba(255,255,255,0.78);line-height:1.55;margin:0 0 18px;max-width:34em;text-wrap:pretty;}
  @media(max-width:480px){p{max-width:none;}}
  .row{display:flex;gap:10px;}
  .btn{font-family:inherit;font-size:14px;font-weight:600;line-height:1;border:1px solid transparent;border-radius:8px;padding:11px 18px;cursor:pointer;}
  .btn.accent{background:var(--color-aqua);color:#062F4A;}
  .btn.ghost{background:transparent;color:#fff;border-color:rgba(255,255,255,0.3);}
  .mark{position:absolute;right:-30px;bottom:-40px;width:280px;opacity:0.10;}
</style>
</head>
<body>
  <div class="hero">
    <div>
      <p class="eyebrow">Asset Information Center</p>
      <h1>The right parts. The right data. At the right time.</h1>
      <p>25 years of catalog conversion, built into one platform. Stop hunting through PDFs — give your team a searchable iBOM they'll actually use.</p>
      <div class="row">
        <button class="btn accent">Request demo</button>
        <button class="btn ghost">See how AIC works</button>
      </div>
    </div>
    <div></div>
    <img class="mark" src="../assets/logo-brandmark-white.svg" alt="">
  </div>
</body>
</html>
